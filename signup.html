<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — GeekyLearn</title>
<meta name="fb-api-key"          content="%FIREBASE_API_KEY%">
<meta name="fb-auth-domain"      content="%FIREBASE_AUTH_DOMAIN%">
<meta name="fb-project-id"       content="%FIREBASE_PROJECT_ID%">
<meta name="fb-storage-bucket"   content="%FIREBASE_STORAGE_BUCKET%">
<meta name="fb-messaging-id"     content="%FIREBASE_MESSAGING_ID%">
<meta name="fb-app-id"           content="%FIREBASE_APP_ID%">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--void:#000005;--border:rgba(0,255,200,0.12);--border2:rgba(0,255,200,0.28);--cyan:#00ffc8;--magenta:#ff00aa;--red:#ff2d55;--text:#c8d8e8;--muted:#445566;--bright:#fff;}
body{background:var(--void);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,200,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,200,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;}
.cfg-err{display:none;position:fixed;top:0;left:0;right:0;background:#ff2d55;color:#fff;text-align:center;padding:10px;font-size:12px;font-family:'Orbitron',monospace;z-index:999;}
.cfg-err.on{display:block;}
.back{position:fixed;top:24px;left:24px;color:var(--muted);text-decoration:none;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s;z-index:10;font-weight:600;}
.back:hover{color:var(--cyan);}
.box{width:100%;max-width:460px;background:rgba(7,7,26,0.92);border:1px solid var(--border2);position:relative;padding:40px;animation:fadeUp 0.5s ease both;backdrop-filter:blur(20px);}
.box::before,.box::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--magenta);border-style:solid;}
.box::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.box::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.3rem;color:var(--cyan);text-align:center;margin-bottom:6px;letter-spacing:0.1em;text-shadow:0 0 20px rgba(0,255,200,0.4);}
.logo em{color:var(--magenta);font-style:normal;}
.tagline{text-align:center;color:var(--muted);font-size:12px;margin-bottom:16px;letter-spacing:0.1em;text-transform:uppercase;}
.perks{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:24px;}
.perk{padding:3px 10px;border:1px solid rgba(0,255,200,0.2);font-size:10px;color:var(--cyan);letter-spacing:0.1em;text-transform:uppercase;}
.sec-line{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.sec-line h2{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--bright);letter-spacing:0.08em;white-space:nowrap;}
.sec-line::after{content:'';flex:1;height:1px;background:var(--border);}
.field{margin-bottom:14px;}
label{display:block;font-size:10px;color:var(--cyan);margin-bottom:5px;letter-spacing:0.18em;text-transform:uppercase;font-weight:600;}
input{width:100%;padding:11px 13px;background:rgba(0,255,200,0.03);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;transition:all 0.2s;outline:none;letter-spacing:0.04em;}
input:focus{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,255,200,0.06);}
input::placeholder{color:var(--muted);}
input.v{border-color:rgba(0,255,200,0.5);}
input.iv{border-color:rgba(255,45,85,0.5);}
.pw-track{height:2px;background:var(--border);margin-top:7px;overflow:hidden;}
.pw-fill{height:100%;transition:all 0.3s;width:0%;}
.hw{font-size:10px;margin-top:5px;letter-spacing:0.08em;text-transform:uppercase;}
.ok{color:var(--cyan);}.bad{color:var(--red);}
.btn{width:100%;padding:14px;background:var(--cyan);border:none;color:#000;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;margin-top:8px;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,0.2);transform:skewX(-20deg);animation:shimmer 2.5s infinite;}
@keyframes shimmer{0%{left:-60%}100%{left:130%}}
.btn:hover{box-shadow:0 0 24px rgba(0,255,200,0.4);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.terms{font-size:11px;color:var(--muted);margin:12px 0;line-height:1.6;}
.terms a{color:var(--cyan);text-decoration:none;}
.link-row{text-align:center;font-size:13px;color:var(--muted);margin-top:16px;}
.link-row a{color:var(--cyan);text-decoration:none;font-weight:600;}
.msg{padding:10px 14px;font-size:12px;margin-bottom:12px;display:none;border-left:2px solid;}
.msg.error{background:rgba(255,45,85,0.07);border-color:var(--red);color:var(--red);display:block;}
.msg.success{background:rgba(0,255,200,0.07);border-color:var(--cyan);color:var(--cyan);display:block;}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:sp 0.7s linear infinite;margin-right:6px;vertical-align:middle;}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="cfg-err" id="cfg-err">⚠ Firebase config missing — add Environment Variables in Vercel</div>
<a class="back" href="index.html">← Back</a>
<div class="box">
  <div class="logo">GEEKY<em>LEARN</em></div>
  <div class="tagline">// Join the Content Revolution</div>
  <div class="perks"><span class="perk">✓ Free Forever</span><span class="perk">✓ No Card</span><span class="perk">✓ Instant Access</span></div>
  <div class="sec-line"><h2>CREATE OPERATOR PROFILE</h2></div>
  <div id="msg" class="msg"></div>
  <div class="field"><label>Display Name</label><input type="text" id="name" placeholder="Your handle name" oninput="vN(this)" autocomplete="name"></div>
  <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="operator@domain.com" oninput="vE(this)" autocomplete="email"></div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min. 8 characters" oninput="vP(this)" autocomplete="new-password">
    <div class="pw-track"><div class="pw-fill" id="pf"></div></div>
    <div class="hw" id="ph"></div>
  </div>
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password" oninput="vC(this)" autocomplete="new-password">
    <div class="hw" id="ch"></div>
  </div>
  <div class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</div>
  <button class="btn" id="btn" onclick="doSignup()">⚡ INITIATE ACCOUNT</button>
  <div class="link-row">Have an account? <a href="login.html">Log in →</a></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile, sendEmailVerification }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const g=n=>{const e=document.querySelector(`meta[name="${n}"]`);return e?e.content:'';};
const cfg={apiKey:g('fb-api-key'),authDomain:g('fb-auth-domain'),projectId:g('fb-project-id'),storageBucket:g('fb-storage-bucket'),messagingSenderId:g('fb-messaging-id'),appId:g('fb-app-id')};
const ok=Object.values(cfg).every(v=>v&&!v.startsWith('%'));
if(!ok) document.getElementById('cfg-err').classList.add('on');
const app=ok?initializeApp(cfg):null, auth=app?getAuth(app):null, db=app?getFirestore(app):null;
if(auth) onAuthStateChanged(auth,u=>{if(u)location.href='app.html';});

const BAD=['mailinator.com','tempmail.com','throwaway.email','guerrillamail.com','sharklasers.com','yopmail.com'];
window.vN=el=>{el.className=el.value.trim().length>=2?'v':'';};
window.vE=el=>{const ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)&&!BAD.includes(el.value.split('@')[1]?.toLowerCase());el.className=ok?'v':(el.value?'iv':'');};
window.vP=el=>{const v=el.value,f=document.getElementById('pf'),h=document.getElementById('ph');let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;const c=['','#ff2d55','#ffe500','#00d4ff','#00ffc8'],l=['','WEAK','FAIR','GOOD','STRONG'];f.style.width=(s*25)+'%';f.style.background=c[s];h.textContent=v.length?l[s]:'';h.className='hw '+(s>=3?'ok':'bad');el.className=v.length>=8?'v':'iv';};
window.vC=el=>{const pw=document.getElementById('password').value,ok=el.value===pw&&el.value.length>0;el.className=ok?'v':(el.value?'iv':'');const ch=document.getElementById('ch');ch.textContent=el.value?(ok?'✓ MATCH':'✗ MISMATCH'):'';ch.className='hw '+(ok?'ok':'bad');};
function msg(t,tp){const e=document.getElementById('msg');e.textContent=t;e.className='msg '+tp;}
window.doSignup=async()=>{
  if(!auth){msg('⚠ Not configured.','error');return;}
  const n=document.getElementById('name').value.trim(),em=document.getElementById('email').value.trim(),pw=document.getElementById('password').value,cf=document.getElementById('confirm').value,b=document.getElementById('btn');
  if(n.length<2){msg('⚠ Name min 2 chars.','error');return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)){msg('⚠ Invalid email.','error');return;}
  if(BAD.includes(em.split('@')[1]?.toLowerCase())){msg('⚠ Use a real email.','error');return;}
  if(pw.length<8){msg('⚠ Password min 8 chars.','error');return;}
  if(pw!==cf){msg('⚠ Passwords do not match.','error');return;}
  b.disabled=true;b.innerHTML='<span class="spin"></span>CREATING…';
  try{
    const cred=await createUserWithEmailAndPassword(auth,em,pw);
    await updateProfile(cred.user,{displayName:n});
    await sendEmailVerification(cred.user);
    if(db) await setDoc(doc(db,'users',cred.user.uid),{displayName:n,email:em,createdAt:serverTimestamp(),plan:'free',postsGenerated:0});
    msg('✓ Account created! Check email to verify, then log in.','success');
    b.textContent='✓ DONE';
    setTimeout(()=>location.href='login.html',3500);
  }catch(e){const m={'auth/email-already-in-use':'Email already registered.','auth/weak-password':'Stronger password needed.','auth/invalid-email':'Invalid email.'};msg('⚠ '+(m[e.code]||e.message),'error');b.disabled=false;b.innerHTML='⚡ INITIATE ACCOUNT';}
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doSignup();});
</script>
</body>
</html>
